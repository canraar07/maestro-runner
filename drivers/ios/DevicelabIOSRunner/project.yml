name: DevicelabIOSRunner

options:
  bundleIdPrefix: dev.devicelab.runner
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:

  DevicelabIOSRunner:
    type: application
    platform: iOS
    sources:
      - DevicelabIOSRunner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.devicelab.runner
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO

  DevicelabIOSRunnerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - DevicelabIOSRunnerUITests
    dependencies:
      - target: DevicelabIOSRunner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.devicelab.runner.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DevicelabIOSRunner
        SWIFT_OBJC_BRIDGING_HEADER: DevicelabIOSRunnerUITests/Bridging-Header.h
        CODE_SIGN_STYLE: Automatic
